name: buscapega

services:

  db:
    image: postgres:16-alpine
    container_name: buscapega_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-buscapega}
      POSTGRES_USER: ${POSTGRES_USER:-buscapega}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-buscapega_secret}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-buscapega}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: buscapega_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-buscapega}:${POSTGRES_PASSWORD:-buscapega_secret}@db:5432/${POSTGRES_DB:-buscapega}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      SCRAPER_URL: http://scraper:8001
      ENVIRONMENT: ${ENVIRONMENT:-development}
    volumes:
      - ./backend:/app
      - ..:/buscapega
      - playwright_cookies:/app/cookies:ro
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  scraper:
    build:
      context: ./scraper
      dockerfile: Dockerfile
    container_name: buscapega_scraper
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      BACKEND_URL: http://backend:8000
      WHATSAPP_URL: http://whatsapp:3001
      GMAIL_USER: ${GMAIL_USER:-}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD:-}
      GMAIL_FROM_NAME: ${GMAIL_FROM_NAME:-Rodrigo Moya}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./scraper:/app
      - playwright_cookies:/app/cookies
    ports:
      - "8001:8001"
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: buscapega_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    # Modo producción: compila la app y la sirve optimizada. Evita la compilación
    # on-demand del modo dev (que hacía que el menú requiriera varios clics y
    # generaba peticiones webpack hot-update). Reconstruye desde el código montado
    # en cada arranque, así un redeploy siempre sirve la versión más reciente.
    command: sh -c "npm run build && npm start"

  whatsapp:
    build:
      context: ./whatsapp
      dockerfile: Dockerfile
    container_name: buscapega_whatsapp
    restart: unless-stopped
    environment:
      PORT: 3001
      DEFAULT_PHONE: ${WHATSAPP_DEFAULT_PHONE:-56962075019}
      PAIRING_PHONE: ${WHATSAPP_PAIRING_PHONE:-56962075019}
      AUTH_DIR: /app/auth
    volumes:
      - whatsapp_auth:/app/auth
    ports:
      - "3001:3001"

volumes:
  db_data:
    driver: local
  playwright_cookies:
    driver: local
  whatsapp_auth:
    driver: local
