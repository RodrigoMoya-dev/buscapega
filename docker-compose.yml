version: "3.9"

services:

  db:
    image: postgres:16-alpine
    container_name: buscapega_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-buscapega}
      POSTGRES_USER: ${POSTGRES_USER:-buscapega}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-buscapega_secret}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-buscapega}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: buscapega_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-buscapega}:${POSTGRES_PASSWORD:-buscapega_secret}@db:5432/${POSTGRES_DB:-buscapega}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    volumes:
      - ./backend:/app
      - playwright_cookies:/app/cookies
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  scraper:
    build:
      context: ./scraper
      dockerfile: Dockerfile
    container_name: buscapega_scraper
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-buscapega}:${POSTGRES_PASSWORD:-buscapega_secret}@db:5432/${POSTGRES_DB:-buscapega}
      BACKEND_URL: http://backend:8000
    volumes:
      - ./scraper:/app
      - playwright_cookies:/app/cookies
    # El scraper corre bajo demanda invocado por el backend/scheduler

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: buscapega_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    # Modo producción: evita la compilación on-demand del modo dev (menú lento /
    # webpack hot-update). Reconstruye desde el código montado en cada arranque.
    command: sh -c "npm run build && npm start"

volumes:
  db_data:
    driver: local
  playwright_cookies:
    driver: local
